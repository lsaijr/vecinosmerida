<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publicar JSON - VecinosMérida</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
        }
        h1 { color: #2d3748; margin-bottom: 10px; }
        .subtitle { color: #718096; font-size: 14px; margin-bottom: 30px; }
        .upload-area {
            border: 3px dashed #cbd5e0;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }
        .upload-area:hover { border-color: #667eea; background: #f7fafc; }
        input[type="file"] { display: none; }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin: 10px 5px;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-warning { background: linear-gradient(135deg, #f6ad55 0%, #ed8936 100%); }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            display: none;
        }
        .status.success { background: #c6f6d5; color: #22543d; border: 1px solid #9ae6b4; }
        .status.error { background: #fed7d7; color: #742a2a; border: 1px solid #fc8181; }
        .status.info { background: #bee3f8; color: #2c5282; border: 1px solid #90cdf4; }
        .error-detail {
            margin-top: 10px;
            padding: 10px;
            background: #fff;
            border-radius: 4px;
            max-height: 300px;
            overflow: auto;
            font-family: monospace;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔬 Publicar con Debug</h1>
        <p class="subtitle">Captura errores completos para análisis</p>

        <div class="upload-area" id="uploadArea">
            <input type="file" id="fileInput" accept=".json">
            <h3>📂 Arrastra tu JSON aquí</h3>
            <p id="fileName" style="color: #667eea; margin-top: 15px; font-weight: 600;"></p>
        </div>

        <div style="text-align: center;">
            <button class="btn btn-warning" id="btnDebug" disabled>🔬 Modo Debug</button>
            <button class="btn" id="btnPublicar" disabled>🚀 Publicar en BD</button>
        </div>

        <div class="status" id="status"></div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileName = document.getElementById('fileName');
        const btnDebug = document.getElementById('btnDebug');
        const btnPublicar = document.getElementById('btnPublicar');
        const status = document.getElementById('status');
        let jsonData = null;

        uploadArea.addEventListener('click', () => fileInput.click());
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#667eea';
        });
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.style.borderColor = '#cbd5e0';
        });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#cbd5e0';
            if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) handleFile(e.target.files[0]);
        });

        async function handleFile(file) {
            if (!file.name.endsWith('.json')) {
                showStatus('error', 'Por favor sube un archivo JSON');
                return;
            }
            fileName.textContent = `📄 ${file.name}`;
            try {
                const text = await file.text();
                jsonData = JSON.parse(text);
                btnDebug.disabled = false;
                btnPublicar.disabled = false;
                showStatus('success', `✅ JSON cargado: ${jsonData.posts?.length || 0} posts`);
            } catch (error) {
                showStatus('error', '❌ Error al leer JSON: ' + error.message);
                jsonData = null;
                btnDebug.disabled = true;
                btnPublicar.disabled = true;
            }
        }

        btnDebug.addEventListener('click', () => publicarConDebug(true));
        btnPublicar.addEventListener('click', () => {
            if (confirm('¿Confirmas que deseas publicar en BD?')) {
                publicarConDebug(false);
            }
        });

        async function publicarConDebug(debugMode) {
            if (!jsonData) return;
            btnDebug.disabled = true;
            btnPublicar.disabled = true;

            showStatus('info', debugMode ? '🔄 Generando debug...' : '🔄 Publicando...');

            try {
                const formData = new FormData();
                const blob = new Blob([JSON.stringify(jsonData)], { type: 'application/json' });
                formData.append('file', blob, 'data.json');
                const url = debugMode ? '/publicar?debug=true' : '/publicar';
                
                const response = await fetch(url, { method: 'POST', body: formData });
                
                // CAPTURAR EL TEXTO RAW PRIMERO
                const rawText = await response.text();
                console.log('📥 RESPUESTA RAW DEL SERVIDOR:', rawText);
                
                // Intentar parsear como JSON
                let result;
                try {
                    result = JSON.parse(rawText);
                } catch (parseError) {
                    // NO es JSON, es HTML de error
                    console.error('❌ El servidor retornó HTML en vez de JSON');
                    
                    // Descargar el HTML completo
                    const blob = new Blob([rawText], { type: 'text/html' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `error_servidor_${new Date().toISOString().replace(/:/g, '-')}.html`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    
                    showStatus('error', '❌ Error del servidor (HTML descargado). Revisa la consola del navegador.');
                    
                    // Mostrar preview del error
                    const preview = rawText.substring(0, 500);
                    status.innerHTML += `<div class="error-detail">${preview.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</div>`;
                    return;
                }

                if (!response.ok) {
                    throw new Error(result.error || 'Error en el servidor');
                }

                if (debugMode && result.debug_data) {
                    const blob = new Blob([JSON.stringify(result.debug_data, null, 2)], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `debug_${new Date().toISOString().replace(/:/g, '-')}.json`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    showStatus('success', '✅ Debug descargado');
                } else {
                    showStatus('success', `✅ Publicado: ${result.total_nuevos} nuevos`);
                }

            } catch (error) {
                showStatus('error', '❌ Error: ' + error.message);
                console.error(error);
            } finally {
                btnDebug.disabled = false;
                btnPublicar.disabled = false;
            }
        }

        function showStatus(type, message) {
            status.className = `status ${type}`;
            status.innerHTML = message;
            status.style.display = 'block';
        }
    </script>
</body>
</html>
