  .subtitle { color: var(--muted); font-size: .85rem; font-family: 'Space Mono', monospace; }

// ── Ortografía (portado de limpiar_json.py) ─────────────────

// ── Regex ────────────────────────────────────────────────────

const _RE_HASHTAG    = /#\w+/g;

  /\b(\d{3})[\s\-.](\d{3})[\s\-.](\d{4})\b/,
  /(?:\+52|52)[\s\-]?(\d{10})\b/,
  /(?:cel|tel|whatsapp|wha|llamar?\s*al?|marca\s*al?)[:\s\-]*(\d[\d\s\-.]{8,12}\d)/i,
  /wa\.me(?:\/c)?\/(?:52)?(\d{10})/,

// ═══════════════════════════════════════════════════════════════
// FUNCIONES DE NORMALIZACIÓN (portadas de limpiar_json.py)
// ═══════════════════════════════════════════════════════════════

function _norm(t) { return (t || '').toLowerCase(); }

function limpiarUnicodeFB(txt) {
  if (!txt) return txt;
  let r = '';
  for (const ch of txt) {
    const cp = ch.codePointAt(0);
    r += (cp >= 0x1D400 && cp <= 0x1D7FF) ? ' ' : ch;
  }
  return r.replace(/ {2,}/g, ' ').trim();
}

function sentenceCase(seg) {
  seg = seg.trim();
  if (!seg || seg.length < 4) return seg;
  const letras = seg.match(/[a-zA-ZÁÉÍÓÚÑáéíóúñ]/g) || [];
  if (!letras.length) return seg;
  const pct = letras.filter(l => l === l.toUpperCase() && l !== l.toLowerCase()).length / letras.length;
  if (pct <= 0.35) return seg;
  return seg[0].toUpperCase() + seg.slice(1).toLowerCase();
}

function normalizarMayusculas(txt) {
  if (!txt) return txt;
  return txt.split('\n').map(linea => {
    return linea.split(/(?<=[.!?¡¿])\s+/).map(sentenceCase).join(' ');
  }).join('\n');
}

function corregirOrtografia(txt) {
  if (!txt) return txt;
  for (const [pat, corr] of ORTOGRAFIA) txt = txt.replace(pat, corr);
  return txt;
}

function limpiarPuntuacion(txt) {
  if (!txt) return txt;
  txt = txt.replace(/!{2,}/g, '!');
  txt = txt.replace(/\?{2,}/g, '?');
  txt = txt.replace(/\.{4,}/g, '...');
  txt = txt.replace(/ {2,}/g, ' ');
  txt = txt.replace(/\t/g, ' ');
  txt = txt.replace(/\n{3,}/g, '\n\n');
  return txt.trim();
}

function normalizarTextoCompleto(txt) {
  txt = limpiarUnicodeFB(txt);
  txt = normalizarMayusculas(txt);
  txt = corregirOrtografia(txt);
  txt = limpiarPuntuacion(txt);
  return txt;
}

// ── texto_limpio: versión sin URLs/hashtags/emojis para IA ──
function generarTextoLimpio(txt) {
  if (!txt) return '';
  txt = txt.replace(_RE_MENCIONES, '');
  txt = txt.replace(_RE_URL, '');
  txt = txt.replace(_RE_HASHTAG, '');
  txt = txt.replace(_RE_EMOJI, '');
  txt = txt.replace(_RE_DECO_UNI, '');
  txt = txt.split(/\s+/).filter(w => !(w.length > 25 && /\d/.test(w) && /[a-zA-Z]/.test(w))).join(' ');
  txt = txt.replace(_RE_SIGNOS_REP, m => /[!?]/.test(m[0]) ? m[0] : '...');
  txt = txt.replace(_RE_ESPACIOS, ' ').trim();
  return txt;
}

// ── Teléfono ────────────────────────────────────────────────
function extraerTelefono(txt) {
  if (!txt) return null;
  for (const pat of _PATRONES_TEL) {
    const m = txt.match(pat);
    if (m) {
      const num = m.slice(1).filter(Boolean).join('').replace(/\D/g, '');
      if (num.length >= 10) return num.slice(-10);
    }
  }
  return null;
}

function contarPalabras(txt) {
  return (txt || '').trim().split(/\s+/).filter(w => w.length > 0).length;
}

// ── fbid_post: preservar del scraper o generar hash ─────────
function simpleHash(str) {
  let h1 = 0, h2 = 0;
  for (let i = 0; i < str.length; i++) {
    h1 = ((h1 << 5) - h1) + str.charCodeAt(i);
    h1 = h1 & h1;
  }
  for (let i = str.length - 1; i >= 0; i--) {
    h2 = ((h2 << 7) - h2) + str.charCodeAt(i);
    h2 = h2 & h2;
  }
  return Math.abs(h1).toString(16).padStart(8,'0') + Math.abs(h2).toString(16).padStart(8,'0');
}

function asegurarFbidPost(post) {
  if (post.fbid_post && !post.fbid_post.startsWith('syn_')) return post.fbid_post;
  if (post.fbid_post) return post.fbid_post; // ya tiene syn_ del scraper
  // Fallback: generar hash determinista
  const clave = (post.autor || '') + '|' + (post.texto || '').substring(0, 80);
  return 'syn_' + simpleHash(clave);
}

// ═══════════════════════════════════════════════════════════════
// DESCARTE DETERMINISTA
// ═══════════════════════════════════════════════════════════════

function esDescartable(post, cfg) {
  const txt = (post.texto || '').trim();
  const num_imgs = post.num_imgs || 0;

  // Autor fantasma
  if ((post.autor || '').includes('Indicador de estado online')) return 'autor_fantasma';
  if (!(post.autor || '').trim()) return 'autor_vacio';

  // UI residual
  if (_UI_FB.has(_norm(txt))) return 'ui_facebook';
  // Solo teléfono
  if (_RE_SOLO_TEL.test(txt)) return 'solo_telefono';
  // TikTok
  if (_RE_TIKTOK.test(txt)) return 'spam_tiktok';
  // Live
  if (_RE_LIVE.test(txt)) return 'live_stream';
  // Token basura
  const palabras = txt.split(/\s+/);
  if (palabras.some(w => w.length > 28 && /\d/.test(w) && /[a-zA-Z]/.test(w))) return 'token_basura';
  // Imagen requerida según tipo de grupo
  if (cfg.requiere_imagen && num_imgs === 0) return 'sin_imagen';
  // Texto muy corto
  if (contarPalabras(txt) < cfg.min_palabras) return 'texto_corto';
  // Consulta sin valor comercial
  if (CONSULTA_HINTS.some(h => _norm(txt).includes(h))) return 'consulta';

  return null;
}

// ═══════════════════════════════════════════════════════════════
// DEDUPLICACIÓN
// ═══════════════════════════════════════════════════════════════

function deduplicar(posts) {
  const seen = {};
  const resultado = [];
  for (const p of posts) {
    const autor = _norm(p.autor || '').substring(0, 30);
    const texto = _norm(p.texto || '').substring(0, 120);
    const clave = autor + '|' + texto;
    if (seen[clave]) {
      seen[clave].repeticiones = (seen[clave].repeticiones || 1) + 1;
    } else {
      p.repeticiones = p.repeticiones || 1;
      seen[clave] = p;
      resultado.push(p);
    }
  }
  return resultado;
}

// ═══════════════════════════════════════════════════════════════
// PRE-CLASIFICACIÓN POR KEYWORDS
// ═══════════════════════════════════════════════════════════════

function preClasificar(texto, autor, grupoTipo) {
  const haystack = _norm(texto) + ' ' + _norm(autor);
  const scores = {};
  for (const [tipo, grupos] of Object.entries(_KW)) {
    let score = 0;
    for (const [peso, kws] of Object.entries(grupos)) {
      for (const kw of kws) { if (haystack.includes(kw)) score += Number(peso); }
    }
    scores[tipo] = score;
  }
  const mejorTipo  = Object.keys(scores).reduce((a, b) => scores[a] >= scores[b] ? a : b);
  const mejorScore = scores[mejorTipo];

  if (mejorTipo === 'noticia' && contarPalabras(texto) < NEWS_MIN_WORDS) return ['ambiguo', 0];
  if (grupoTipo === 'empleo' && scores['empleo'] >= UMBRAL_KW) return ['empleo', scores['empleo']];
  if (mejorScore >= UMBRAL_KW) return [mejorTipo, mejorScore];
  return ['ambiguo', 0];
}

// ═══════════════════════════════════════════════════════════════
// FILTRO URGENTE GEOGRÁFICO
// ═══════════════════════════════════════════════════════════════

function clasificarUrgenteGeo(texto) {
  const t = _norm(texto);
  if (!_SIGNALS_URGENTE.some(s => t.includes(s))) return null;
  const tieneLocal  = _GEO_YUCATAN.some(s => t.includes(s));
  const tieneExterna = _GEO_EXTERNA.some(s => t.includes(s));
  if (tieneLocal && !tieneExterna) return 'alerta';
  if (tieneExterna) return 'ignorar';
  return 'ambiguo';
}

// ═══════════════════════════════════════════════════════════════
// PIPELINE PRINCIPAL
// ═══════════════════════════════════════════════════════════════

let rawData = null;
let resultadoFinal = null;
let prospectos = [];

function procesar() {
  const grupoTipo = document.getElementById('grupoTipo').value;
  const cfg = CONFIG_GRUPO[grupoTipo] || CONFIG_GRUPO['vecinos'];
  const posts = rawData.posts || [];

  document.getElementById('cardConfig').classList.remove('active');
  document.getElementById('cardConfig').classList.add('done');
  document.getElementById('num1').textContent = '✓';
  document.getElementById('num1').classList.add('done-num');
  document.getElementById('cardResults').classList.remove('hidden');
  document.getElementById('cardResults').classList.add('active');
  document.getElementById('btnStart').disabled = true;

  const logBox = document.getElementById('logBox');
  logBox.innerHTML = '';

  log(`═══ Procesando ${posts.length} posts — grupo: ${grupoTipo} ═══`, 'info');

  // ── PASO 0: Contar frecuencia por autor_id (ANTES de todo) ──
  log('📊 Paso 0: Contando frecuencia por autor...', '');
  const autorFreq = {};
  const autorNombres = {};
  const autorTelefonos = {};
  for (const p of posts) {
    const aid = p.autor_id || p.autor_url || null;
    if (!aid) continue;
    autorFreq[aid] = (autorFreq[aid] || 0) + 1;
    autorNombres[aid] = p.autor || 'desconocido';
    const tel = extraerTelefono(p.texto || '');
    if (tel) autorTelefonos[aid] = tel;
  }
  const autoresMultiple = Object.entries(autorFreq).filter(([,c]) => c >= 2).sort((a,b) => b[1] - a[1]);
  log(`  → ${autoresMultiple.length} autores publican 2+ veces`, 'info');
  setProgress(10);

  // ── PASO 1: Descarte determinista ──
  log('🧹 Paso 1: Descarte determinista...', '');
  const stats = { autor_fantasma:0, sin_imagen:0, texto_corto:0, token_basura:0,
                  spam_tiktok:0, live_stream:0, ui_facebook:0, solo_telefono:0,
                  consulta:0, autor_vacio:0 };
  const postsFiltrados = [];
  for (const p of posts) {
    const razon = esDescartable(p, cfg);
    if (razon) {
      stats[razon] = (stats[razon] || 0) + 1;
    } else {
      postsFiltrados.push(p);
    }
  }
  const totalDescartados = posts.length - postsFiltrados.length;
  log(`  → ${totalDescartados} descartados, ${postsFiltrados.length} pasan`, 'ok');
  for (const [k,v] of Object.entries(stats)) { if (v > 0) log(`    ${k}: ${v}`, ''); }
  setProgress(30);

  // ── PASO 2: Normalización de texto ──
  log('✏️ Paso 2: Normalizando texto...', '');
  for (const p of postsFiltrados) {
    p.texto = normalizarTextoCompleto(p.texto || '');
  }
  setProgress(45);

  // ── PASO 3: Deduplicación ──
  log('🔁 Paso 3: Deduplicación...', '');
  const antesDedup = postsFiltrados.length;
  const postsUnicos = deduplicar(postsFiltrados);
  const duplicados = antesDedup - postsUnicos.length;
  log(`  → ${duplicados} duplicados eliminados, ${postsUnicos.length} únicos`, 'ok');
  setProgress(55);

  // ── PASO 4: Enriquecimiento + pre-clasificación ──
  log('🏷 Paso 4: Enriquecimiento y pre-clasificación...', '');
  const postsFinales = [];
  let descartadosPostLimpio = 0;
  const tipoCounts = {};

  for (const p of postsUnicos) {
    // fbid_post
    p.fbid_post = asegurarFbidPost(p);

    // texto_limpio
    const textoLimpio = generarTextoLimpio(p.texto || '');

    // ⚠ CHECK: si texto_limpio queda vacío (posts 100% hashtags), descartar
    if (textoLimpio.length < 3 && contarPalabras(p.texto || '') > 0) {
      descartadosPostLimpio++;
      continue;
    }

    // Teléfono
    const telefono = extraerTelefono(p.texto || '') || extraerTelefono(p.autor || '');

    // Filtro urgente geográfico
    const geoUrgente = clasificarUrgenteGeo(p.texto || '');
    if (geoUrgente === 'ignorar') { descartadosPostLimpio++; continue; }

    let preOverride = null;
    if (geoUrgente === 'alerta') preOverride = ['alerta', 3];

    // Pre-clasificación
    const [pre_tipo, pre_score] = preOverride || preClasificar(textoLimpio, p.autor || '', grupoTipo);

    // Frecuencia del autor
    const aid = p.autor_id || p.autor_url || null;
    const autor_frecuencia = aid ? (autorFreq[aid] || 1) : 1;

    tipoCounts[pre_tipo] = (tipoCounts[pre_tipo] || 0) + 1;

    postsFinales.push({
      ...p,
      texto_limpio:      textoLimpio,
      telefono:          telefono || null,
      pre_tipo,
      pre_score,
      noticia_permitida: cfg.noticia_umbral < 9999 ? contarPalabras(p.texto || '') >= cfg.noticia_umbral : false,
      autor_frecuencia,
    });
  }

  if (descartadosPostLimpio > 0) {
    log(`  ⚠ ${descartadosPostLimpio} post(s) descartados: texto_limpio vacío o geo externa`, 'warn');
  }

  const tipoStr = Object.entries(tipoCounts).sort((a,b)=>b[1]-a[1]).map(([t,c])=>`${t}:${c}`).join(' · ');
  log(`  → Pre-tipos: ${tipoStr}`, 'info');
  setProgress(80);

  // ── PASO 5: Construir prospectos ──
  log('🎯 Paso 5: Identificando prospectos...', '');
  prospectos = [];
  for (const [aid, count] of autoresMultiple) {
    const nombre = autorNombres[aid] || '?';
    const tel = autorTelefonos[aid] || null;
    // Buscar qué tipos publica
    const postsDeAutor = postsFinales.filter(p => (p.autor_id || p.autor_url) === aid);
    const tiposPublicados = [...new Set(postsDeAutor.map(p => p.pre_tipo))];
    const tieneRepeticiones = postsDeAutor.some(p => (p.repeticiones || 1) > 1);

    prospectos.push({
      autor_id: aid,
      nombre,
      posts_total: count,
      posts_aprobados: postsDeAutor.length,
      telefono: tel,
      tipos: tiposPublicados,
      repite_contenido: tieneRepeticiones,
    });
  }
  log(`  → ${prospectos.length} prospectos identificados`, 'ok');
  setProgress(90);

  // ── Resultado final ──
  resultadoFinal = {
    meta: {
      ...rawData.meta,
      total_posts:         postsFinales.length,
      grupo_tipo:          grupoTipo,
      procesado_etapa1:    true,
      descartados_total:   totalDescartados + duplicados + descartadosPostLimpio,
      descartados_filtro:  totalDescartados,
      duplicados,
      descartados_post_limpio: descartadosPostLimpio,
      prospectos_count:    prospectos.length,
      fecha_proceso:       new Date().toISOString(),
    },
    posts: postsFinales,
  };

  log(`═══ ✅ Completado: ${posts.length} → ${postsFinales.length} posts (${posts.length - postsFinales.length} eliminados) ═══`, 'ok');
  setProgress(100);

  // ── Render UI ──
  renderStats(posts.length, postsFinales.length, totalDescartados, duplicados, descartadosPostLimpio, tipoCounts, postsFinales);
  renderProspectos();
  document.getElementById('downloadSection').classList.remove('hidden');
}

// ═══════════════════════════════════════════════════════════════
// UI
// ═══════════════════════════════════════════════════════════════

function setProgress(pct) {
  document.getElementById('progressBar').style.width = pct + '%';
}

function log(msg, type = '') {
  const box = document.getElementById('logBox');
  const line = document.createElement('div');
  line.className = type ? `log-${type}` : '';
  const time = new Date().toLocaleTimeString('es-MX', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
  line.textContent = `[${time}] ${msg}`;
  box.appendChild(line);
  box.scrollTop = box.scrollHeight;
}

function renderStats(total, final, descartados, duplicados, postLimpio, tipoCounts, posts) {
  const conTel = posts.filter(p => p.telefono).length;
  const conRepeticiones = posts.filter(p => (p.repeticiones || 1) > 1).length;
  const fbidReal = posts.filter(p => p.fbid_post && !p.fbid_post.startsWith('cft_') && !p.fbid_post.startsWith('syn_')).length;

  const items = [
    { label: 'Entrada',     val: total,         color: 'var(--text)' },
    { label: 'Descartados', val: descartados,    color: 'var(--error)' },
    { label: 'Duplicados',  val: duplicados,     color: 'var(--warn)' },
    { label: 'Post-limpio', val: postLimpio,     color: 'var(--error)' },
    { label: 'Salida',      val: final,          color: 'var(--success)' },
    { label: 'Con teléfono',val: conTel,         color: 'var(--accent2)' },
    { label: 'Repiten',     val: conRepeticiones,color: 'var(--accent3)' },
    { label: 'fbid real',   val: fbidReal,       color: 'var(--accent)' },
  ];

  document.getElementById('statsGrid').innerHTML = items.map(i => `
    <div class="stat-item">
      <div class="stat-val" style="color:${i.color}">${i.val}</div>
      <div class="stat-label">${i.label}</div>
    </div>`).join('');

  // Pre-tipo distribution
  const colors = { negocio:'#7c3aed', alerta:'#ef4444', mascota:'#06b6d4', noticia:'#f59e0b', empleo:'#10b981', ambiguo:'#64748b', ignorar:'#374151' };
  const tipoItems = Object.entries(tipoCounts).sort((a,b) => b[1]-a[1]);
  if (tipoItems.length > 0) {
    document.getElementById('preTipoSection').classList.remove('hidden');
    document.getElementById('preTipoGrid').innerHTML = tipoItems.map(([t,c]) => `
      <div class="stat-item">
        <div class="stat-val" style="color:${colors[t] || 'var(--text)'}">${c}</div>
        <div class="stat-label">${t}</div>
      </div>`).join('');
  }
}

function renderProspectos() {
  if (prospectos.length === 0) return;
  document.getElementById('prospectSection').classList.remove('hidden');

  const colors = { negocio:'#7c3aed', alerta:'#ef4444', mascota:'#06b6d4', noticia:'#f59e0b', empleo:'#10b981', ambiguo:'#64748b' };
  const top = prospectos.slice(0, 15);

  let html = `<table class="prospect-table">
    <thead><tr><th>Autor</th><th>Posts</th><th>Tel</th><th>Tipos</th><th>Repite</th></tr></thead><tbody>`;

  for (const p of top) {
    const tiposBadges = p.tipos.map(t =>
      `<span class="tipo-badge" style="background:${colors[t]||'#333'}22;color:${colors[t]||'#999'}">${t}</span>`
    ).join(' ');
    html += `<tr>
      <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.nombre}</td>
      <td style="text-align:center;color:var(--accent3);font-weight:700">${p.posts_total}</td>
      <td>${p.telefono ? '📞' : '—'}</td>
      <td>${tiposBadges}</td>
      <td>${p.repite_contenido ? '🔁' : ''}</td>
    </tr>`;
  }
  html += '</tbody></table>';
  document.getElementById('prospectTable').innerHTML = html;
}

function descargarJSON() {
  if (!resultadoFinal) return;
  const blob = new Blob([JSON.stringify(resultadoFinal, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const gid = rawData.meta?.group_id || 'grupo';
  const tipo = document.getElementById('grupoTipo').value;
  a.download = `etapa1_${tipo}_${gid}_${Date.now()}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function descargarProspectos() {
  if (!prospectos.length) return;
  const blob = new Blob([JSON.stringify(prospectos, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `prospectos_${rawData.meta?.group_id || 'grupo'}_${Date.now()}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
}

// ── File input ──────────────────────────────────────────────
document.getElementById('fileInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      rawData = JSON.parse(ev.target.result);
      const n = rawData.posts?.length || 0;
      document.getElementById('fileName').textContent = `✓ ${file.name} — ${n} posts`;
      document.getElementById('fileName').classList.remove('hidden');
      document.getElementById('btnStart').disabled = false;

      // Auto-detectar tipo de grupo por nombre
      const name = _norm(rawData.meta?.group_name || '');
      if (['empleo','trabajo','vacante','contratando'].some(k => name.includes(k)))
        document.getElementById('grupoTipo').value = 'empleo';
      else if (['mascota','adopci','perros perdidos','gatos perdidos','rescate animal'].some(k => name.includes(k)))
        document.getElementById('grupoTipo').value = 'mascotas';
      else if (['noticias','policía','policia','seguridad','informativo'].some(k => name.includes(k)))
        document.getElementById('grupoTipo').value = 'noticias';
      else if (['compra','venta','marketplace','negocios','servicios'].some(k => name.includes(k)))
        document.getElementById('grupoTipo').value = 'ventas';
      else
        document.getElementById('grupoTipo').value = 'vecinos';

    } catch(err) {
      alert('JSON inválido: ' + err.message);
    }
  };
  reader.readAsText(file);
});

const fd = document.getElementById('fileDrop');
fd.addEventListener('dragover', e => { e.preventDefault(); fd.classList.add('dragover'); });
fd.addEventListener('dragleave', () => fd.classList.remove('dragover'));
fd.addEventListener('drop', e => {
  e.preventDefault(); fd.classList.remove('dragover');
  if (e.dataTransfer.files[0]) {
    document.getElementById('fileInput').files = e.dataTransfer.files;
    document.getElementById('fileInput').dispatchEvent(new Event('change'));
  }
});
</script>
